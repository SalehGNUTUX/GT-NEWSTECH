<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GT-NEWSTECH Admin</title>
<link rel="icon" href="/site-icons/gt-newstech-icon.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css" crossorigin="anonymous">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="/site-icons/gt-newstech-icon.png" alt="GT-NEWSTECH" class="brand-logo">
    <div>
      <div class="brand-name">GT-NEWSTECH</div>
      <div class="brand-sub">Admin Panel</div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <a href="#dashboard" class="nav-item active" data-page="dashboard">
      <i class="fa-solid fa-gauge-high"></i><span>لوحة التحكم</span>
    </a>
    <a href="#articles" class="nav-item" data-page="articles">
      <i class="fa-solid fa-newspaper"></i><span>المقالات</span>
    </a>
    <a href="#new-article" class="nav-item" data-page="new-article">
      <i class="fa-solid fa-plus"></i><span>مقال جديد</span>
    </a>
    <a href="#images" class="nav-item" data-page="images">
      <i class="fa-solid fa-images"></i><span>الصور</span>
    </a>
    <div class="nav-sep"></div>
    <a href="#git" class="nav-item" data-page="git">
      <i class="fa-brands fa-git-alt"></i><span>Git / نشر</span>
    </a>
    <a href="#config" class="nav-item" data-page="config">
      <i class="fa-solid fa-gear"></i><span>الإعدادات</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <a href="http://localhost:4000/" target="_blank" class="preview-link">
      <i class="fa-solid fa-eye"></i> معاينة الموقع
    </a>
  </div>
</aside>

<!-- Main -->
<div class="main-wrap">
  <header class="topbar">
    <button class="sidebar-toggle" id="sidebarToggle">
      <i class="fa-solid fa-bars"></i>
    </button>
    <div class="topbar-title" id="topbarTitle">لوحة التحكم</div>
    <div class="topbar-actions">
      <span class="lang-badge ar active" id="filterAr" title="عربي">AR</span>
      <span class="lang-badge en" id="filterEn" title="إنجليزي">EN</span>
    </div>
  </header>

  <main class="content" id="content">
    <div class="loading-wrap"><i class="fa-solid fa-spinner fa-spin"></i></div>
  </main>
</div>

<!-- Article Editor Modal -->
<div class="modal-overlay" id="editorModal" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <h2 id="editorTitle">تحرير المقال</h2>
      <button class="btn-icon" id="closeEditor"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="editor-tabs">
        <button class="etab active" data-tab="details">
          <i class="fa-solid fa-sliders"></i> البيانات
        </button>
        <button class="etab" data-tab="paste-fm">
          <i class="fa-solid fa-paste"></i> لصق FM
        </button>
        <button class="etab" data-tab="content">
          <i class="fa-solid fa-pen-nib"></i> المحتوى
        </button>
        <button class="etab" data-tab="preview">
          <i class="fa-solid fa-eye"></i> معاينة
        </button>
      </div>

      <!-- Tab: Paste Front Matter -->
      <div class="etab-pane" id="tab-paste-fm">
        <div class="fm-paste-intro">
          <i class="fa-solid fa-circle-info"></i>
          الصق كتلة الـ Front Matter كاملةً (مع أو بدون <code>---</code>) وسيتم توزيع كل حقل تلقائياً على خانته.
        </div>
        <textarea id="fmPasteArea" class="fm-paste-area"
          placeholder="---&#10;layout: post&#10;title: &quot;عنوان المقال&quot;&#10;date: 2026-05-09&#10;category: foss&#10;lang: ar&#10;slug: my-slug&#10;author: GNUTUX&#10;tags: [وسم1, وسم2]&#10;excerpt: &quot;ملخص المقال...&quot;&#10;---"></textarea>
        <div class="fm-paste-actions">
          <button class="btn btn-gold" id="parseFmBtn">
            <i class="fa-solid fa-wand-magic-sparkles"></i> تحليل وملء الحقول
          </button>
          <button class="btn btn-ghost" id="clearFmBtn">
            <i class="fa-solid fa-trash"></i> مسح
          </button>
        </div>
        <div id="fmParseResult" class="fm-parse-result" hidden></div>
      </div>

      <!-- Tab: Details -->
      <div class="etab-pane active" id="tab-details">
        <div class="form-grid">
          <div class="form-group fg-full">
            <label>العنوان <span class="req">*</span></label>
            <input type="text" id="fTitle" placeholder="عنوان المقال الكامل">
          </div>
          <div class="form-group">
            <label>القسم الرئيسي <span class="req">*</span></label>
            <select id="fCategory">
              <option value="gnutux-projects">مشاريع GNUTUX</option>
              <option value="foss">البرمجيات الحرة</option>
              <option value="gnulinux">غنو/لينكس</option>
              <option value="tech-news">أخبار التقنية</option>
              <option value="ai">الذكاء الاصطناعي</option>
            </select>
          </div>
          <div class="form-group">
            <label>اللغة <span class="req">*</span></label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="fLang" value="ar" checked> العربية</label>
              <label class="radio-label"><input type="radio" name="fLang" value="en"> English</label>
            </div>
          </div>
          <div class="form-group">
            <label>تاريخ النشر <span class="req">*</span></label>
            <input type="date" id="fDate">
          </div>
          <div class="form-group">
            <label>Slug <span class="req">*</span> <small>(لاتيني-بدون-مسافات)</small></label>
            <input type="text" id="fSlug" placeholder="my-article-slug-2026" dir="ltr">
          </div>
          <div class="form-group">
            <label>الكاتب</label>
            <input type="text" id="fAuthor" value="GNUTUX">
          </div>
          <div class="form-group fg-full">
            <label>الملخص (Excerpt)</label>
            <textarea id="fExcerpt" rows="2" placeholder="ملخص قصير يظهر في قوائم المقالات وفي SEO..."></textarea>
          </div>
          <div class="form-group fg-full">
            <label>الوسوم (Tags) <small>مفصولة بفاصلة</small></label>
            <input type="text" id="fTags" placeholder="لينكس, برمجة, تقنية" dir="rtl">
          </div>
          <div class="form-group fg-full">
            <label>أقسام إضافية (also_in)</label>
            <div class="checks-row" id="fAlsoIn">
              <label class="check-label"><input type="checkbox" value="gnutux-projects"> GNUTUX</label>
              <label class="check-label"><input type="checkbox" value="foss"> FOSS</label>
              <label class="check-label"><input type="checkbox" value="gnulinux"> GNU/Linux</label>
              <label class="check-label"><input type="checkbox" value="tech-news"> Tech</label>
              <label class="check-label"><input type="checkbox" value="ai"> AI</label>
            </div>
          </div>
          <div class="form-group">
            <label>صورة الترويسة</label>
            <div class="img-input-row">
              <input type="text" id="fImage" placeholder="image-name.jpg" dir="ltr">
              <button class="btn btn-sm" id="pickImageBtn">
                <i class="fa-solid fa-folder-open"></i>
              </button>
            </div>
            <div id="fImagePreview" class="img-thumb-wrap"></div>
          </div>
          <div class="form-group form-check-inline">
            <label class="toggle-label">
              <input type="checkbox" id="fAffiliate">
              <span class="toggle-text">يحتوي روابط أفيلييت</span>
            </label>
          </div>
        </div>
      </div>

      <!-- Tab: Content -->
      <div class="etab-pane" id="tab-content">
        <div class="editor-toolbar">
          <button class="tb-btn" data-insert="**" title="غامق"><i class="fa-solid fa-bold"></i></button>
          <button class="tb-btn" data-insert="*" title="مائل"><i class="fa-solid fa-italic"></i></button>
          <button class="tb-btn" data-insert-h="## " title="عنوان"><i class="fa-solid fa-heading"></i></button>
          <button class="tb-btn" data-insert-h="### " title="عنوان فرعي">H3</button>
          <span class="tb-sep"></span>
          <button class="tb-btn" data-insert-line="- " title="قائمة"><i class="fa-solid fa-list-ul"></i></button>
          <button class="tb-btn" data-insert-line="1. " title="قائمة مرقمة"><i class="fa-solid fa-list-ol"></i></button>
          <button class="tb-btn" data-insert-block="> " title="اقتباس"><i class="fa-solid fa-quote-right"></i></button>
          <span class="tb-sep"></span>
          <button class="tb-btn" data-insert-code="```\n" title="كود"><i class="fa-solid fa-code"></i></button>
          <button class="tb-btn" data-insert="`" title="كود مضمن"><i class="fa-solid fa-terminal"></i></button>
          <span class="tb-sep"></span>
          <button class="tb-btn" data-action="link" title="رابط"><i class="fa-solid fa-link"></i></button>
          <button class="tb-btn" data-action="aff-link" title="رابط أفيلييت" style="color:var(--gold)">AFF</button>
        </div>
        <textarea id="fContent" class="content-editor" placeholder="اكتب محتوى المقال هنا بصيغة Markdown...
&#10;## عنوان رئيسي&#10;&#10;فقرة نصية..."></textarea>
        <div class="editor-footer">
          <span id="wordCount">0 كلمة</span>
        </div>
      </div>

      <!-- Tab: Preview -->
      <div class="etab-pane" id="tab-preview">
        <div class="preview-pane" id="previewPane"></div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" id="cancelEditor">إلغاء</button>
      <button class="btn btn-gold" id="saveArticle">
        <i class="fa-solid fa-floppy-disk"></i> حفظ المقال
      </button>
    </div>
  </div>
</div>

<!-- Image Picker Modal -->
<div class="modal-overlay" id="imagePickerModal" hidden>
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h2>اختر صورة</h2>
      <button class="btn-icon" id="closeImagePicker"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="picker-lang-tabs">
        <button class="ptab active" data-lang="ar">AR صور</button>
        <button class="ptab" data-lang="en">EN Images</button>
      </div>
      <div class="image-picker-grid" id="imagePickerGrid"></div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
