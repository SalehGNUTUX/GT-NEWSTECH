---
layout: none
sitemap: false
robots: noindex
---
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>GT-NEWSTECH CMS</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════════════════
       GT-NEWSTECH Theme for Decap CMS
       locale: en → LTR layout → Collections panel on LEFT ✓
       ═══════════════════════════════════════════════════════════ */

    /* ── متغيرات الوضع الداكن (افتراضي) ── */
    :root {
      --cms-bg:      #0a0a0a;
      --cms-bg2:     #111111;
      --cms-bg3:     #1a1a1a;
      --cms-border:  #2a2a2a;
      --cms-text:    #e0d8c8;
      --cms-muted:   #666;
      --cms-gold:    #d4a017;
      --cms-gold-l:  #f0c040;
      --cms-gold-bg: rgba(212,160,23,.1);
    }

    /* ── الوضع الفاتح ── */
    .cms-light {
      --cms-bg:      #f0ece4;
      --cms-bg2:     #ffffff;
      --cms-bg3:     #f5f0e8;
      --cms-border:  #d8d0c0;
      --cms-text:    #1a1a1a;
      --cms-muted:   #777;
    }

    /* ── شاشة التحميل ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Cairo','Inter',sans-serif; background: var(--cms-bg); }

    #loadingScreen {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      background: linear-gradient(135deg,#0a0a0a 0%,#1a1200 50%,#0a0a0a 100%);
      transition: opacity .5s ease;
    }
    #loadingScreen.hide { opacity: 0; pointer-events: none; }
    .loading-logo {
      width: 80px; height: 80px; border-radius: 16px;
      animation: glow 2s ease-in-out infinite;
    }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 20px rgba(212,160,23,.3); }
      50%      { box-shadow: 0 0 40px rgba(212,160,23,.6); }
    }
    .loading-title { font-size: 1.3rem; font-weight: 900; color: #d4a017; letter-spacing: 1px; }
    .loading-sub   { font-size: .65rem; color: #6a5a20; letter-spacing: 3px; text-transform: uppercase; }
    .loading-dots  { display: flex; gap: .4rem; margin-top: .5rem; }
    .loading-dots span {
      width: 6px; height: 6px; border-radius: 50%; background: #d4a017;
      animation: dots .9s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .15s; }
    .loading-dots span:nth-child(3) { animation-delay: .3s; }
    @keyframes dots {
      0%,80%,100% { opacity: .2; transform: scale(.8); }
      40%          { opacity: 1;  transform: scale(1.2); }
    }

    /* ── زر تبديل الوضع ── */
    #cmsThemeToggle {
      position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 9998;
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--cms-gold); color: #000;
      border: none; cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(212,160,23,.4);
      transition: all .25s;
    }
    #cmsThemeToggle:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(212,160,23,.6); }

    /* ═══════════════════════════════════════════════════════════
       ثيم GT-NEWSTECH — CSS متحفظ لا يتعارض مع Decap
       ═══════════════════════════════════════════════════════════ */

    /* خط Cairo لكل الواجهة */
    #nc-root, #nc-root * {
      font-family: 'Cairo', 'Inter', sans-serif !important;
    }

    /* خلفية عامة */
    #nc-root { background: var(--cms-bg) !important; color: var(--cms-text) !important; }
    body      { background: var(--cms-bg) !important; }

    /* الهيدر */
    #nc-root header {
      background: var(--cms-bg) !important;
      border-bottom: 2px solid var(--cms-gold) !important;
      box-shadow: 0 2px 20px rgba(0,0,0,.4) !important;
    }

    /* الشريط الجانبي */
    #nc-root aside {
      background: var(--cms-bg) !important;
      border-right: 1px solid var(--cms-border) !important;
    }
    #nc-root aside a, #nc-root aside button {
      color: var(--cms-muted) !important;
      transition: all .2s !important;
    }
    #nc-root aside a:hover { color: var(--cms-gold) !important; background: var(--cms-gold-bg) !important; }

    /* المنطقة الرئيسية */
    #nc-root main { background: var(--cms-bg2) !important; }

    /* بطاقات المقالات */
    #nc-root [class*="Card"], #nc-root article {
      background: var(--cms-bg3) !important;
      border: 1px solid var(--cms-border) !important;
      border-radius: 10px !important;
      overflow: hidden !important;
      transition: border-color .2s, box-shadow .2s !important;
    }
    #nc-root [class*="Card"]:hover {
      border-color: var(--cms-gold) !important;
      box-shadow: 0 4px 16px rgba(212,160,23,.15) !important;
    }

    /* صور في البطاقات */
    #nc-root [class*="Card"] img {
      width: 100% !important; height: 160px !important;
      object-fit: cover !important; border-radius: 0 !important;
      display: block !important;
    }

    /* الأزرار الرئيسية */
    #nc-root button[class*="primary"],
    #nc-root [class*="PublishButton"] {
      background: linear-gradient(135deg, var(--cms-gold), var(--cms-gold-l)) !important;
      color: #000 !important; border: none !important;
      font-weight: 700 !important; border-radius: 8px !important;
    }

    /* حقول الإدخال */
    #nc-root input[type="text"],
    #nc-root input[type="search"],
    #nc-root textarea,
    #nc-root select {
      background: var(--cms-bg3) !important;
      border: 1px solid var(--cms-border) !important;
      color: var(--cms-text) !important;
      border-radius: 8px !important;
    }
    #nc-root input:focus, #nc-root textarea:focus {
      border-color: var(--cms-gold) !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(212,160,23,.2) !important;
    }

    /* محرر Markdown */
    #nc-root [class*="Editor"], #nc-root [class*="MarkdownControl"] {
      background: var(--cms-bg3) !important;
      border: 1px solid var(--cms-border) !important;
      border-radius: 10px !important;
    }
    #nc-root [class*="Toolbar"] {
      background: var(--cms-bg) !important;
      border-bottom: 1px solid var(--cms-border) !important;
    }
    #nc-root [class*="Toolbar"] button { color: var(--cms-muted) !important; }
    #nc-root [class*="Toolbar"] button:hover { color: var(--cms-gold) !important; background: var(--cms-gold-bg) !important; }

    /* شريط التمرير */
    #nc-root ::-webkit-scrollbar { width: 5px; height: 5px; }
    #nc-root ::-webkit-scrollbar-track { background: var(--cms-bg); }
    #nc-root ::-webkit-scrollbar-thumb { background: var(--cms-border); border-radius: 3px; }
    #nc-root ::-webkit-scrollbar-thumb:hover { background: var(--cms-gold); }

    /* روابط */
    #nc-root a { color: var(--cms-gold) !important; }

    /* ── الوضع الفاتح ── */
    .cms-light #nc-root        { background: var(--cms-bg) !important; }
    .cms-light #nc-root main   { background: var(--cms-bg2) !important; }
    .cms-light #nc-root aside  { background: var(--cms-bg3) !important; }
    .cms-light #nc-root header { background: #fff !important; }
    .cms-light #nc-root [class*="Card"]  { background: #fff !important; }
    .cms-light #nc-root input[type="text"],
    .cms-light #nc-root textarea { background: #fff !important; color: #1a1a1a !important; }
    .cms-light body { background: var(--cms-bg) !important; }
  </style>
</head>
<body>

  <!-- شاشة التحميل -->
  <div id="loadingScreen">
    <img src="{{ site.baseurl }}/assets/icons/gt-newstech-icon.png" alt="GT-NEWSTECH" class="loading-logo">
    <div class="loading-title">GT-NEWSTECH</div>
    <div class="loading-sub">GNUTUX NEWS TECH</div>
    <div class="loading-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- زر تبديل الوضع -->
  <button id="cmsThemeToggle" title="Toggle dark/light mode">🌙</button>

  <script>
    /* تبديل الوضع الداكن/الفاتح */
    (function() {
      var key = 'gnt-cms-theme';
      var btn = document.getElementById('cmsThemeToggle');
      var html = document.documentElement;
      function apply(t) {
        if (t === 'light') { html.classList.add('cms-light'); btn.textContent = '☀️'; }
        else               { html.classList.remove('cms-light'); btn.textContent = '🌙'; }
        localStorage.setItem(key, t);
      }
      apply(localStorage.getItem(key) || 'dark');
      btn.addEventListener('click', function() {
        apply(html.classList.contains('cms-light') ? 'dark' : 'light');
      });
    })();

    /* إخفاء شاشة التحميل */
    (function() {
      var t = setTimeout(hide, 6000);
      function hide() {
        clearTimeout(t);
        var s = document.getElementById('loadingScreen');
        if (s) { s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 500); }
      }
      new MutationObserver(function(_, o) {
        if (document.querySelector('#nc-root [class]')) { o.disconnect(); setTimeout(hide, 800); }
      }).observe(document.body, { childList: true, subtree: true });
    })();
  </script>

  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- تسجيل Preview Styles -->
  <script>
    (function wait() {
      if (window.CMS && CMS.registerPreviewStyle) {
        CMS.registerPreviewStyle('{{ site.baseurl }}/assets/css/style.css');
        CMS.registerPreviewStyle(
          'body{background:#f8f6f0;font-family:"Cairo",sans-serif;padding:2rem;max-width:860px;margin:0 auto;line-height:1.8;color:#1a1a1a;direction:rtl;}' +
          'h2{color:#d4a017;border-bottom:2px solid rgba(212,160,23,.2);padding-bottom:.4rem;margin:1.5rem 0 .75rem;}' +
          'h3{margin:1.25rem 0 .5rem;}a{color:#d4a017;}' +
          'blockquote{border-right:4px solid #d4a017;padding:.75rem 1.25rem;background:rgba(212,160,23,.06);border-radius:0 8px 8px 0;color:#555;}' +
          'pre{background:#0d0d0d;color:#e0d8c8;padding:1rem;border-radius:8px;overflow-x:auto;}' +
          'code{background:#f0ece0;padding:.1em .4em;border-radius:3px;color:#c0600a;}' +
          'table{width:100%;border-collapse:collapse;}th{background:#0a0a0a;color:#d4a017;padding:.6rem .9rem;text-align:right;}' +
          'td{padding:.55rem .9rem;border-bottom:1px solid #e2d9c8;}img{max-width:100%;border-radius:10px;margin:1rem 0;}',
          { raw: true }
        );
      } else { setTimeout(wait, 300); }
    })();
  </script>

</body>
</html>
