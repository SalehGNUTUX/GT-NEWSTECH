---
layout: none
permalink: /
---
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GT-NEWSTECH — GNUTUX NEWS TECH</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="canonical" href="{{ site.url }}{{ site.baseurl }}/">
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/assets/icons/gt-newstech-icon.png">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#0a0a0a;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Cairo','Inter',sans-serif}
    .splash{text-align:center;padding:2rem}
    .splash-logo{width:80px;height:80px;border-radius:16px;margin:0 auto 1.25rem}
    .splash-title{font-size:2rem;font-weight:900;color:#d4a017;letter-spacing:1px;font-family:'Inter','Arial',sans-serif}
    .splash-sub{font-size:.75rem;color:#6a5a20;letter-spacing:3px;margin-bottom:2.5rem;font-family:'Inter',sans-serif;text-transform:uppercase}
    .lang-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
    .lang-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 2rem;border-radius:10px;font-weight:700;font-size:1rem;text-decoration:none;transition:transform .2s,box-shadow .2s}
    .lang-btn-ar{background:linear-gradient(135deg,#d4a017,#f0c040);color:#000}
    .lang-btn-en{background:transparent;color:#d4a017;border:2px solid #6a4a10}
    .lang-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,160,23,.3)}
    .redirecting{margin-top:1.5rem;font-size:.8rem;color:#444;font-family:'Inter',sans-serif}
  </style>
</head>
<body>
  <div class="splash">
    <img src="{{ site.baseurl }}/assets/icons/gt-newstech-icon.png" alt="GT-NEWSTECH" class="splash-logo">
    <div class="splash-title">GT-NEWSTECH</div>
    <div class="splash-sub">GNUTUX NEWS TECH</div>
    <div class="lang-btns">
      <a href="{{ site.baseurl }}/ar/" class="lang-btn lang-btn-ar" data-lang="ar">العربية</a>
      <a href="{{ site.baseurl }}/en/" class="lang-btn lang-btn-en" data-lang="en">English</a>
    </div>
    <p class="redirecting" id="redirectMsg"></p>
  </div>
  <script>
    (function(){
      var base = '{{ site.baseurl }}';
      var stored = localStorage.getItem('gnt-lang');
      var lang = stored || (navigator.language && navigator.language.toLowerCase().startsWith('ar') ? 'ar' : 'en');
      document.querySelectorAll('[data-lang]').forEach(function(a){
        a.addEventListener('click', function(){
          localStorage.setItem('gnt-lang', a.dataset.lang);
        });
      });
      if(stored){
        var msg = document.getElementById('redirectMsg');
        if(msg) msg.textContent = 'Redirecting...';
        window.location.replace(base + '/' + lang + '/');
      }
    })();
  </script>
</body>
</html>
