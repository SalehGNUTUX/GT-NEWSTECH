title: GT-NEWSTECH
tagline: "GNUTUX NEWS TECH"
description: "أخبار ومقالات تقنية حول مشاريع GNUTUX، البرمجيات الحرة، غنو/لينكس، التقنية، والذكاء الاصطناعي – بالعربية والإنجليزية"
baseurl: "/GT-NEWSTECH"
url: "https://SalehGNUTUX.github.io"
logo: "/GT-NEWSTECH/assets/icons/gt-newstech-icon.png"
author: "GNUTUX"
email: "gnutux.arabic@gmail.com"
github_username: SalehGNUTUX
license: "GNU AGPL v3"
license_url: "https://www.gnu.org/licenses/agpl-3.0.html"

collections:
  ar:
    output: true
    permalink: /ar/:categories/:slug/
  en:
    output: true
    permalink: /en/:categories/:slug/

defaults:
  - scope:
      path: ""
      type: "ar"
    values:
      layout: "post"
      lang: "ar"
      affiliate: true
  - scope:
      path: ""
      type: "en"
    values:
      layout: "post"
      lang: "en"
      affiliate: true

# Category labels (used in templates)
categories_ar:
  gnutux-projects: "مشاريع GNUTUX"
  foss: "البرمجيات الحرة"
  gnulinux: "غنو/لينكس"
  tech-news: "أخبار التقنية"
  ai: "الذكاء الاصطناعي"
  gaming: "ألعاب لينكس"

categories_en:
  gnutux-projects: "GNUTUX Projects"
  foss: "Free & Open Source"
  gnulinux: "GNU/Linux"
  tech-news: "Tech News"
  ai: "Artificial Intelligence"
  gaming: "Linux Gaming"

# Pagination (optional)
paginate: 12
paginate_path: "/page/:num/"

# ── تفعيل المقالات المستقبلية ──────────────────────────────
# يحل مشكلة: 404 عندما يكون تاريخ النشر متقدماً ولو بدقائق
# على وقت النظام (يحدث مع UTC/local timezone shifts).
future: true
unpublished: false

# Markdown processor
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - "Text File.txt"
  - "هيكل المشروع.txt"
  - vendor/
  - node_modules/
  - admin/
  - serve.sh
  - admin-start.sh
  - start.sh
  - "دليل-العمل.md"
  - "دليل-تغيير-النطاق.md"
  - "دليل-الربط-بـGitHub.md"
  - "دليل-نظام-لوحتي-التحكم.md"
  - "قالب-مقال-مرجعي.md"
  - CLAUDE.md
  - README.md
  - .claude/
  - ".claude"
