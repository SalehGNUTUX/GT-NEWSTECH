{% if page.layout == 'post' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "NewsArticle",
  "headline": {{ page.title | jsonify }},
  "description": {{ page.excerpt | default: page.description | strip_html | truncate: 160 | jsonify }},
  "datePublished": "{{ page.date | date_to_xmlschema }}",
  "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
  "url": "{{ page.url | absolute_url }}",
  "inLanguage": "{{ page.lang }}",
  {% if page.image %}
  "image": {
    "@type": "ImageObject",
    "url": "{{ site.url }}{{ site.baseurl }}/assets/images/{{ page.lang }}/{{ page.image }}",
    "width": 1200,
    "height": 630
  },
  {% endif %}
  "author": {
    "@type": "Person",
    "name": {{ page.author | default: site.author | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": "GT-NEWSTECH",
    "url": "{{ site.url }}{{ site.baseurl }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.url }}{{ site.baseurl }}/assets/icons/gt-newstech-icon.png",
      "width": 512,
      "height": 512
    }
  },
  "articleSection": {{ page.category | jsonify }},
  "keywords": {% if page.tags %}{{ page.tags | join: ", " | jsonify }}{% else %}""{% endif %}
}
</script>
{% else %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "GT-NEWSTECH",
  "alternateName": "GNUTUX NEWS TECH",
  "url": "{{ site.url }}{{ site.baseurl }}",
  "description": {{ site.description | jsonify }},
  "publisher": {
    "@type": "Organization",
    "name": "GNUTUX",
    "url": "{{ site.url }}{{ site.baseurl }}",
    "logo": {
      "@type": "ImageObject",
      "url": "{{ site.url }}{{ site.baseurl }}/assets/icons/gt-newstech-icon.png"
    }
  },
  "potentialAction": {
    "@type": "SearchAction",
    "target": {
      "@type": "EntryPoint",
      "urlTemplate": "{{ site.url }}{{ site.baseurl }}/search.json?q={search_term_string}"
    },
    "query-input": "required name=search_term_string"
  }
}
</script>
{% endif %}
